# aacode configuration
language: en    # en / zh

context:
  compact_threshold: 32000
  history_compression: true
  max_context_length: 131072
  strategy: file_based
  use_vector_store: false
  # 上下文缩减（卸载）配置
  compact_trigger_tokens: 256000      # 触发缩减的token数阈值
  compact_keep_messages: 50          # 缩减后保留的消息数
  compact_keep_rounds: 10            # 缩减后保留的对话轮数（最近N轮）
  compact_summary_steps: 10         # 摘要包含的步骤数
  compact_protect_first_rounds: 1   # 保护前N轮（只保留 system prompt，其余由 AI 摘要承载）
  compact_protect_user_rounds: 2    # 保护最新N条用户消息及附带消息（≥2，确保最新上下文完整）

# 输出处理配置（自适应截断 — 基于剩余上下文预算）
output:
  budget_ratio: 0.6            # 工具输出最多占用剩余预算的比例
  max_preview_tokens: 2000     # 预览最多 token 数
  display_preview_chars: 3000  # 用户终端显示预览字符数

# 超时配置
timeouts:
  shell_command: 30         # Shell命令执行超时（秒）
  model_summary: 60         # 模型摘要生成超时（秒）
  file_search: 20            # 文件搜索超时（秒）
  code_execution: 60        # 代码执行超时（秒）
  sandbox_command: 120      # 沙箱命令超时（秒）
  web_request: 60           # 网络请求超时（秒）

# 限制配置
limits:
  max_file_list_results: 100    # 文件列表最大结果数
  max_search_results: 10        # 搜索最大结果数
  max_retries: 1                # 最大重试次数（设为1=不重试）
  shell_output_preview: 200     # Shell输出预览长度（字符）
  
  # 文件读取智能提示配置
  max_auto_read_lines: 200      # 超过此行数时提供分段建议
  structure_preview_lines: 50   # 结构预览显示的行数
  
  # 上下文文件结构配置
  max_context_files: 50         # 上下文中显示的最大文件数（从30增加到50）
  prioritize_file_types: true   # 是否优先显示重要文件类型

model:
  temperature: 0.7
  max_tokens: 96000   # 单次输出tokens长度
  default_model: deepseek    # 默认使用的模型 key
  models:
    deepseek:
      name: deepseek-v4-flash
      gateway: openai
      base_url: https://api.deepseek.com/v1
      api_key: ""   # 从环境变量 LLM_API_KEY 或 OPENAI_API_KEY 读取
    moonshot_kimi_k2.5:
      name: kimi-k2.5
      gateway: openai
      base_url: https://api.moonshot.cn/v1
      api_key: ""
    minimax_m2.5:
      name: MiniMax-M2.5
      gateway: anthropic
      base_url: https://api.minimax.chat/anthropic
      api_key: ""

# 多模态模型配置（支持扩展多个多模态模型）
multimodal:
  # 是否启用多模态功能
  enabled: true
  
  # 默认使用的多模态模型
  default_model: moonshot_kimi_k2.5
  
  # 多模态模型列表（可扩展）
  models:
    # Kimi K2.5 多模态模型
    moonshot_kimi_k2.5:
      name: kimi-k2.5
      provider: moonshot
      gateway: openai
      base_url: "https://api.moonshot.cn/v1"  # 默认从环境变量 MULTIMODAL_API_URL 读取，默认 https://api.moonshot.cn/v1
      api_key: ""  # 默认从环境变量 MULTIMODAL_API_KEY 读取
      vision: true
      video: true
      max_image_size: 10485760  # 10MB
      max_video_size: 104857600  # 100MB
      supported_formats:
        images: [".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp"]
        videos: [".mp4", ".avi", ".mov", ".mkv", ".webm"]
    
    # MiniMax M2.5 多模态模型
    minimax_m2.5:
      name: MiniMax-M2.5
      provider: minimax
      gateway: anthropic
      base_url: "https://api.minimax.chat/v1"  # 从环境变量 默认MULTIMODAL_API_URL 读取，默认 https://api.minimax.chat/v1
      api_key: ""  # 默认从环境变量 MULTIMODAL_API_KEY 或 LLM_API_KEY 读取
      vision: true
      video: true
      max_image_size: 10485760  # 10MB
      max_video_size: 104857600  # 100MB
      supported_formats:
        images: [".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp"]
        videos: [".mp4", ".avi", ".mov", ".mkv", ".webm"]
    
    # 后续可扩展的模型（预留）
    # qwen_vl:
    #   name: qwen-vl-max
    #   provider: alibaba
    #   gateway: openai
    #   base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    #   api_key: your_api_key
    #   vision: true
    #   video: false
    
    # glm:
    #   name: glm-4v-plus
    #   provider: zhipu
    #   gateway: openai
    #   base_url: https://open.bigmodel.cn/api/paas/v4
    #   api_key: your_api_key
    #   vision: true
    #   video: false
agent:
  max_react_iterations: 300
  max_sub_agent_iterations: 100
  enable_auto_planning: true
  enable_todo_tracking: true
safety:
  allow_network: true
  dangerous_command_action: ask   # reject, ask, log — ask 模式下危险命令弹窗确认
  enable_safety_guard: true
  max_file_size: 52428800
  restrict_to_project: false    # false 允许访问项目外路径
tools:
  enable_code_execution: true
  enable_sandbox: true
  enable_search: true
  enable_shell: true
  enable_testing: true
  enable_web_search: true
  enable_fallback_scrape: true      # 所有搜索 API 失败后，用 Bing/Sogou 网页抓取兜底
  max_execution_time: 60
  sandbox_type: docker
  search_api_url: http://192.168.0.106:8081    # 这是开发者xiefujin自己部署的实例，需要替换为你自己的实例
  search_api_key: ""                # SearXNG 无需配置。Brave/Google/Bing/SerpAPI 可填这里或设环境变量
  search_engine: searxng

# MCP（模型上下文协议）配置
mcp:
  # 是否启用MCP功能
  enabled: true
  
  # 自动连接配置
  auto_connect: true
  connection_timeout: 30
  max_retries: 1
  
  # STD类型MCP服务器配置（标准进程）
  std_servers:
    - name: local_tools
      command: python3
      args: 
        - "-c"
        - "print('MCP server placeholder')"
      enabled: false
      timeout: 30
      retry_count: 3
  
  # SSE类型MCP服务器配置（Server-Sent Events）
  sse_servers:
    - name: filesystem
      url: http://localhost:3001
      enabled: false
      timeout: 30
      retry_count: 3
    - name: database
      url: http://localhost:3002
      enabled: false
      timeout: 30
      retry_count: 3
    - name: web_search
      url: http://localhost:3003
      enabled: false
      timeout: 30
      retry_count: 3

# Skills配置
skills:
  # 是否启用skills功能
  enabled: true
  
  # Skills目录（相对于项目根目录）
  skills_dir: skills
  
  # 是否自动发现skills目录下的技能
  auto_discover: true
